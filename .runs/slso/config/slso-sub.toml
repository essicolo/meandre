# ─── SLSO Sub-basin (station 023448, ~204 nodes) ─────────────────────────
# Petit sous-bassin pour itération rapide. Généré par extract_subbasin.py.

[paths]
basin_db = "data/slso-sub.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/rqh_2026-03/data/03_imputation/quebec.zarr"
#weather_grid   = "/mnt/c/Users/parse01/documents-locaux/rqh-local/rqh_2026-03/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing-sub.nc"
checkpoint = "checkpoints/best-sub.pt"
fields_nc = "results/fields-sub.nc"
reach_parquet = "results/reach-sub.parquet"
runs_db = "runs-sub.duckdb"

[basin]
prefix = "SLSO"

[temporal]
date_start = "2016-01-01"
spinup_end = "2016-12-31"
train_start = "2022-01-01"
train_end = "2022-12-31"
val_start = "2023-01-01"
val_end = "2023-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
param_mode = "nerf"

[training]
# Test diagnostique 2026-05-13 : pivot probabiliste sur legacy slso-sub
# pour validation (data prouvée vs stfran open-data biaisé). Config :
# - freeze_spatial = true : préserve cold-start init_from_literature
# - lr constant ultra-bas : anti-overshoot Adam epoch 1
# - w_pbias massif : ancre β=1
# - w_sigma_anchor + target_b : empêche σ inflation via b drift
n_epochs = 10                   # phase 2 : unfreeze NeRF, warm-start
lr = 1e-6                       # 20× plus bas — fine-tuning spatial doux
lr_finetune = 1e-6
warmup_epochs = 0
eta_min_factor = 1.0           # constant LR
weight_decay = 2e-4
freeze_spatial = false          # phase 2 : NeRF apprend du spatial
warm_start = true               # reprendre best.pt de phase 1 (val_kge=0.49)
w_sigma_anchor = 4000.0
sigma_anchor_target_a = -3.0
sigma_anchor_target_b = 1.0
grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 365            # 1 an = 1 chunk, NSE/KGE utilisable
val_every = 1
patience = 20
compile_modules = false
best_metric = "kge_station"

enable_temporal_epoch = 0
enable_residual_epoch = 9999   # désactivé — design actuel doomed, cf. project memory
enable_travel_epoch = 9999
residual_warmup_epochs = 5

# Autopilot (même config que slso.toml, avec grace)
autopilot = false
autopilot_grace_epochs = 10
autopilot_beta_threshold = 0.15
autopilot_beta_penalty = 0.005
autopilot_gamma_threshold = 0.20
autopilot_gamma_penalty = 0.003
autopilot_lr_patience = 8
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.05
autopilot_restart_max = 3
autopilot_activate_residual_at_kge = 0.55

[loss]
# Tuning v2 du pivot probabiliste.
# Problème v1 : NLL non-régularisée → degeneracy σ→large, β explose.
# Fix : w_kge fortement augmenté pour ancrer μ_Q contre la dérive,
# w_log_mse activé pour préserver l'amplitude (anti-aplatissement).
w_nll = 1.0
w_nll_et = 0.0
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 0.5
w_pbias = 500.0   # ancre forte β=1 (sinon β drift)
w_mse = 0.0
w_log_nse = 0.0
w_log_mse = 0.5   # anti-aplatissement (anti γ collapse)
w_nrmse = 0.0
w_physics = 0.01
w_residual = 0.01
