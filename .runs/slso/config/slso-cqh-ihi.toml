# slso-cqh-ihi.toml — Phase A : ContextualQuantileHead + indices IHI.
#
# Tête quantile K=7 non-paramétrique avec médiane libre, features riches :
#   - spatial_params NeRF (36)
#   - Q_sim + log(Q_sim+1) (2)
#   - Indices IHI : GDD, API, SPI, FN, SWE_proxy (5) — normalisés z-score
#   - DOY sin/cos (2)
# Total : 45 features.
#
# Backbone GELÉ depuis best-phase1-grace.pt. Seule la tête s'entraîne.
#
# Résultat attendu (ablation fit_head.py) : δ²≈0.032 val, ≈0.063 test held-out.
#
# Lancer :
#   uv run python .runs/slso/slso.py .runs/slso/config/slso-cqh-ihi.toml

[paths]
basin_db = "data/slso.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/io_2026-04/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing.nc"
checkpoint = "checkpoints/best-cqh-ihi.pt"
fields_nc = "results/fields-cqh-ihi.nc"
reach_parquet = "results/reach-cqh-ihi.parquet"
runs_db = "logs/runs-cqh-ihi.duckdb"

[basin]
prefix = "SLSO"

[forcing]
era5_vars = []

[temporal]
date_start = "2000-01-01"
spinup_end = "2000-12-31"
train_start = "2001-01-01"
train_end = "2018-12-31"
val_start = "2019-01-01"
val_end = "2021-12-31"
test_start = "2022-01-01"
test_end = "2024-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
concrete_dropout = true
concrete_init_p = 0.05
param_mode = "nerf"

# ContextualQuantileHead config
cqh_n_features = 45                # 36 sp + 2 Q + 5 indices + 2 DOY
cqh_taus = [0.05, 0.10, 0.25, 0.50, 0.75, 0.90, 0.95]
cqh_hidden = 64

[soil]
z1 = 0.30
z2_min = 0.30
z2_max = 1.50
z3_min = 0.50
z3_max = 4.00
rain_hours_min = 3.0
rain_hours_max = 24.0

[training]
warm_start = true
warm_start_from = "checkpoints/best-phase1-grace.pt"

n_epochs = 15
lr = 1e-3
lr_finetune = 1e-3
warmup_epochs = 0
eta_min_factor = 1.0
weight_decay = 1e-4

# Backbone GELÉ : seule la tête CQH s'entraîne
freeze_spatial = true
freeze_temporal = true
freeze_backbone = true

grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 180
val_every = 1
patience = 8
compile_modules = false
best_metric = "loss"
best_metric_tolerance = 0.005
station_weight_mode = "sqrt_area"

w_prior = 0.0
w_boundary = 0.0
w_sigma_anchor = 0.0
w_concrete_kl = 0.0

enable_temporal_epoch = 0
enable_residual_epoch = 9999
enable_travel_epoch = 9999
residual_warmup_epochs = 5
tta_warmup_epochs = 10

autopilot = true
autopilot_grace_epochs = 5
autopilot_beta_threshold = 1.00
autopilot_beta_penalty = 0.005
autopilot_gamma_threshold = 0.20
autopilot_gamma_penalty = 0.003
autopilot_lr_patience = 6
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.20
autopilot_restart_max = 2
autopilot_restart_min_no_improve = 3

autopilot_unfreeze_spatial_epoch = 9999
autopilot_unfreeze_spatial_min_kge = 1.0
autopilot_unfreeze_spatial_lr_factor = 1.0

autopilot_nll = false
kendall_gal_auto = false

[loss]
nll_distribution = "contextual-quantile"
nll_lambda = 1.0

w_nll = 0.0
w_nll_et = 0.0
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 0.0
w_pbias = 0.0
w_mse = 0.0
w_log_nse = 0.0
w_log_mse = 0.0
w_nrmse = 0.0
w_quantile = 1.0                   # pilote pinball de ContextualQuantileHead
w_peak = 0.0
w_physics = 0.0
w_residual = 0.0
w_flatness = 0.0

w_et = 0.0
w_tws = 0.0
w_snow = 0.0
