# slso-kendall-gal-v3.toml
# Restaure les hyperparamètres du commit 41ab755 ("kge=0.904"), en ajoutant
# les SEULS éléments validés du v2 :
#   - Kendall-Gal auto phase 1→2 (orchestration séquentielle propre)
#   - autopilot_restart_min_no_improve = 3 (filtre les oscillations transitoires
#     sans gaspiller les 3 restarts du budget — STRICTEMENT MEILLEUR que l'absent)
#
# CAVEAT : la config affichée à 41ab755 a `warm_start = false`, mais on ne sait
# pas avec certitude si le 0.904 a été obtenu :
#   (A) strictement cold-start (un seul `slso.py` from-scratch)
#   (B) via une chaîne de warm-starts manuels (CLI overrides non capturés)
#   (C) cold-start mais avec les 3 restarts autopilot (≈ scénario A automatisé)
#
# Le scénario C est bien reproduit par v3 (autopilot_restart_max = 3).
# Le scénario B ne l'est pas — si v3 plafonne < 0.85, c'est l'indicateur que
# les interventions d'Essi apportaient quelque chose hors-config.
#
# Le test sera diagnostique :
#   v3 atteint ≥ 0.85-0.90 → 0.904 était reproductible automatiquement
#   v3 plafonne 0.78-0.82  → le 0.904 demandait des interventions hors-config
#
# Note : station_weight_mode = sqrt_area (défaut historique). Les expérimentations
# uniform / log_nse sont pour des runs SÉPARÉS après validation du baseline.
#
# Pour lancer :
#   python .runs/slso/slso.py .runs/slso/config/slso-kendall-gal-v3.toml

[paths]
basin_db = "data/slso.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/io_2026-04/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing.nc"
checkpoint = "checkpoints/best-kendall-gal-v3.pt"
fields_nc = "results/fields-kendall-gal-v3.nc"
reach_parquet = "results/reach-kendall-gal-v3.parquet"
runs_db = "logs/runs-kendall-gal-v3.duckdb"

[basin]
prefix = "SLSO"

[temporal]
date_start = "2000-01-01"
spinup_end = "2000-12-31"
train_start = "2001-01-01"
train_end = "2018-12-31"
val_start = "2019-01-01"
val_end = "2021-12-31"
test_start = "2022-01-01"
test_end = "2024-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
concrete_dropout = true
concrete_init_p = 0.05
param_mode = "nerf"

[soil]
z1 = 0.30
z2_min = 0.30
z2_max = 1.50
z3_min = 0.50
z3_max = 4.00
rain_hours_min = 3.0
rain_hours_max = 24.0

[training]
# ── Budget & schedule (config 0.904) ─────────────────────────────────────
n_epochs = 200                        # restauré (60 dans v2 trop court)
lr = 5e-4                             # restauré (3e-4 dans v2)
lr_finetune = 1e-4
warmup_epochs = 5
eta_min_factor = 1.0                  # cosine sans descente (constant après warmup)
weight_decay = 2e-4                   # restauré (1e-4 dans v2)
freeze_spatial = false
freeze_temporal = false
freeze_backbone = false
warm_start = false
grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 180                     # restauré (180 = sweet spot empirique Essi)
val_every = 1
patience = 50
compile_modules = false
best_metric = "kge"                   # restauré (kge pooled = métrique de référence)
best_metric_tolerance = 0.0

# ── Pondération stations : sqrt_area (défaut historique 0.904) ───────────
# Le mode "uniform" sera testé dans un run séparé après validation baseline.
station_weight_mode = "sqrt_area"

# ── Régularisations (config 0.904) ────────────────────────────────────────
w_prior = 0.005                       # restauré (0.01 dans v2 — pull trop fort)
w_boundary = 0.0                      # désactivé (était 0.005 v2)
w_sigma_anchor = 1.0                  # gardé du v2 (validé par diag 2026-05-21)
sigma_anchor_target_a = -3.0
sigma_anchor_target_b = 1.0
w_concrete_kl = 0.0                   # désactivé pour reproduction stricte phase 1

enable_temporal_epoch = 0
enable_residual_epoch = 9999          # désactivé (redesign TODO)
enable_travel_epoch = 9999
residual_warmup_epochs = 5
tta_warmup_epochs = 10

# ── Autopilot : config 0.904 + filtre transient v2 ───────────────────────
autopilot = true
autopilot_grace_epochs = 15           # = 0.904 et v2
autopilot_beta_threshold = 1.00       # DÉSACTIVÉ (Essi : "β-drift = structurel")
autopilot_beta_penalty = 0.005
autopilot_gamma_threshold = 0.20      # restauré (0.35 dans v2 trop tolérant)
autopilot_gamma_penalty = 0.003
autopilot_lr_patience = 8             # restauré (10 dans v2)
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.05   # restauré (0.20 dans v2 trop tolérant)
autopilot_restart_max = 3
autopilot_restart_min_no_improve = 3  # GARDÉ du v2 : filtre les oscillations
                                      # transitoires sans gaspiller le budget restart.
                                      # Strictement meilleur que l'absence du filtre.

autopilot_unfreeze_spatial_epoch = 9999
autopilot_unfreeze_spatial_min_kge = 1.0
autopilot_unfreeze_spatial_lr_factor = 1.0

# ── NLL autopilot : actif en phase 2 ─────────────────────────────────────
autopilot_nll = true
autopilot_nll_initial_kge = 0.90      # cible 0.904 (était 0.85 dans v2)
autopilot_nll_max_regression = 0.05
autopilot_nll_ramp_rate = 1.5
autopilot_nll_max = 1.0
autopilot_nll_min = 0.01

# ── Kendall-Gal phase 1→2 (orchestration v2) ─────────────────────────────
kendall_gal_auto = true
kga_phase1_kge_threshold = 0.85       # seuil de transition (atteignable d'après 0.904)
kga_phase1_plateau_patience = 30      # plus de patience (200 epochs budget)
kga_phase1_min_epochs = 20            # garde-fou élargi (warmup + early conv)
kga_phase2_reset_no_improve = true

[loss]
# ── Loss config 0.904 ─────────────────────────────────────────────────────
# log_mse=0.3 est ce qui a produit 0.904. log_nse sera un comparatif séparé.
w_nll = 0.0
w_nll_et = 0.0
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 1.0                           # per-station KGE
w_pbias = 0.1                         # volume bias
w_mse = 0.1                           # restauré (0.2 dans v2)
w_log_nse = 0.0                       # désactivé (le 0.904 utilisait log_mse)
w_log_mse = 0.3                       # restauré : c'est ce qui a marché
w_nrmse = 0.0
w_physics = 0.01                      # restauré : conservation masse
w_residual = 0.01                     # restauré : L2 sur residual corrector

[phase2]
freeze_spatial = true
freeze_temporal = true
freeze_backbone = true
best_metric = "nll"
lr = 1e-4

[phase2.loss]
w_nll = 0.1
w_kge = 1.0                           # monitoring
w_pbias = 0.0
w_mse = 0.0
w_log_nse = 0.0
w_log_mse = 0.0
w_physics = 0.0
w_residual = 0.0
