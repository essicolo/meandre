# slso-kendall-gal.toml
# Kendall & Gal en un seul jet : phase 1 (déterministe, KGE-driven) →
# phase 2 (probabiliste, backbone gelé, NLL-driven) automatiquement.
#
# Trigger phase 1→2 (OR-combiné) :
#   - kge_station >= kga_phase1_kge_threshold      (succès rapide)
#   - kga_phase1_plateau_patience epochs sans gain (plafond atteint)
# Garde-fou : kga_phase1_min_epochs avant transition possible (anti-faux-positif).
#
# Pour lancer :
#   python .runs/slso/slso.py .runs/slso/config/slso-kendall-gal.toml

[paths]
basin_db = "data/slso.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/io_2026-04/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing.nc"
checkpoint = "checkpoints/best-kendall-gal.pt"
fields_nc = "results/fields-kendall-gal.nc"
reach_parquet = "results/reach-kendall-gal.parquet"
runs_db = "runs-kendall-gal.duckdb"

[basin]
prefix = "SLSO"

[temporal]
date_start = "2000-01-01"
spinup_end = "2000-12-31"
train_start = "2001-01-01"
train_end = "2018-12-31"
val_start = "2019-01-01"
val_end = "2021-12-31"
test_start = "2022-01-01"
test_end = "2024-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
concrete_dropout = true
concrete_init_p = 0.05
param_mode = "nerf"

[soil]
z1 = 0.30
z2_min = 0.30
z2_max = 1.50
z3_min = 0.50
z3_max = 4.00
rain_hours_min = 3.0
rain_hours_max = 24.0

[training]
n_epochs = 60                     # 30 phase 1 + 30 phase 2 budget
lr = 1e-3
lr_finetune = 1e-4
warmup_epochs = 5
eta_min_factor = 1.0
weight_decay = 1e-4
# Phase 1 : backbone libre (pas de freeze ici, kga gérera en phase 2)
freeze_spatial = false
freeze_temporal = false
freeze_backbone = false
warm_start = false
grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 365
val_every = 1
patience = 50
compile_modules = false
best_metric = "kge_station"        # phase 1 = KGE-driven
best_metric_tolerance = 0.0

w_prior = 0.01
w_boundary = 0.005
w_sigma_anchor = 10.0
sigma_anchor_target_a = -3.0
sigma_anchor_target_b = 1.0
w_concrete_kl = 0.01

enable_temporal_epoch = 0
enable_residual_epoch = 9999       # corrector désactivé
enable_travel_epoch = 9999
residual_warmup_epochs = 5
tta_warmup_epochs = 10

# ── Autopilot standard ──────────────────────────────────────────
autopilot = true
autopilot_grace_epochs = 3
autopilot_beta_threshold = 0.15
autopilot_gamma_threshold = 0.20
autopilot_lr_patience = 10
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.05
autopilot_restart_max = 3

# Pas d'unfreeze automatique : kga gère le sens inverse (freeze)
autopilot_unfreeze_spatial_epoch = 9999
autopilot_unfreeze_spatial_min_kge = 1.0
autopilot_unfreeze_spatial_lr_factor = 1.0

# ── NLL autopilot : actif en phase 2 (w_nll initial > 0) ────────
autopilot_nll = true
autopilot_nll_initial_kge = 0.85   # cible KGE de référence pour phase 2
autopilot_nll_max_regression = 0.05
autopilot_nll_ramp_rate = 1.5
autopilot_nll_max = 1.0
autopilot_nll_min = 0.01

# ── Kendall-Gal phase 1→2 ───────────────────────────────────────
kendall_gal_auto = true
kga_phase1_kge_threshold = 0.85    # succès : transition dès qu'on atteint 0.85
kga_phase1_plateau_patience = 20   # plafond : transition après 20 epochs stables
kga_phase1_min_epochs = 10         # garde-fou : pas avant epoch 10
kga_phase2_reset_no_improve = true

[loss]
# Phase 1 : déterministe — KGE + MSE + log_MSE + PBIAS
w_nll = 0.0                        # désactivé en phase 1
w_nll_et = 0.0
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 1.0
w_pbias = 0.1
w_mse = 0.5
w_log_nse = 0.0
w_log_mse = 0.3
w_nrmse = 0.0
w_physics = 0.0
w_residual = 0.0

[phase2]
# Overrides appliqués à la transition phase 1→2 (one-shot)
freeze_spatial = true
freeze_temporal = true             # ConcreteDropout reste trainable
freeze_backbone = true
best_metric = "nll"
lr = 1e-4                          # LR plus bas pour ne pas perturber σ/μ

[phase2.loss]
# Loss weights phase 2 : NLL dominant, KGE en monitoring
w_nll = 0.1                        # autopilot rampera × 1.5 jusqu'à max=1.0
w_kge = 1.0                        # monitoring seul (backbone gelé)
w_pbias = 0.0
w_mse = 0.0
w_log_mse = 0.0
w_physics = 0.0
w_residual = 0.0
