# slso-phase2-grace.toml — Calibration σ probabiliste sur le backbone multi-obj.
#
# Warm-start depuis best-phase1-grace.pt (backbone décollapsé : f_vert ×6-8,
# val_kge 0.921, MODIS+GRACE). Backbone GELÉ, on n'entraîne que les noise heads.
# Recette : Box-Cox NLL (proper scoring) validée précédemment (cov90=0.895).
#
# Lancer (WSL) :
#   wsl ... ./.venv-wsl/bin/python .runs/slso/slso.py \
#           .runs/slso/config/slso-phase2-grace.toml

[paths]
basin_db = "data/slso.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/io_2026-04/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing.nc"
checkpoint = "checkpoints/best-phase2-grace-studentt.pt"
fields_nc = "results/fields-phase2-grace-studentt.nc"
reach_parquet = "results/reach-phase2-grace-studentt.parquet"
runs_db = "logs/runs-phase2-grace-studentt.duckdb"

[basin]
prefix = "SLSO"

[forcing]
era5_vars = []   # cohérent avec Phase 1 (proxies)

[temporal]
date_start = "2000-01-01"
spinup_end = "2000-12-31"
train_start = "2001-01-01"
train_end = "2018-12-31"
val_start = "2019-01-01"
val_end = "2021-12-31"
test_start = "2022-01-01"
test_end = "2024-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
concrete_dropout = true
concrete_init_p = 0.05
param_mode = "nerf"

[soil]
z1 = 0.30
z2_min = 0.30
z2_max = 1.50
z3_min = 0.50
z3_max = 4.00
rain_hours_min = 3.0
rain_hours_max = 24.0

[training]
# Warm-start depuis le backbone décollapsé (Phase 1 multi-obj)
warm_start = true
warm_start_from = "checkpoints/best-phase1-grace.pt"

n_epochs = 20
lr = 5e-5
lr_finetune = 5e-5
warmup_epochs = 0
eta_min_factor = 1.0
weight_decay = 1e-4

# Backbone GELÉ — on calibre uniquement σ
freeze_spatial = true
freeze_temporal = true
freeze_backbone = true

grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 180
val_every = 1
patience = 8
compile_modules = false

# Sélection sur NLL Box-Cox (proper scoring)
best_metric = "nll"
best_metric_tolerance = 0.005
station_weight_mode = "sqrt_area"

# Régularisation σ
w_prior = 0.0
w_boundary = 0.0
w_sigma_anchor = 1.0
sigma_anchor_target_a = -3.0
sigma_anchor_target_b = 1.0
sigma_anchor_var_weight = 0.5
w_concrete_kl = 0.01

enable_temporal_epoch = 0
enable_residual_epoch = 9999
enable_travel_epoch = 9999
residual_warmup_epochs = 5
tta_warmup_epochs = 10

autopilot = true
autopilot_grace_epochs = 3
autopilot_beta_threshold = 1.0
autopilot_gamma_threshold = 1.0
autopilot_lr_patience = 10
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.10
autopilot_restart_max = 3
autopilot_restart_min_no_improve = 3

autopilot_unfreeze_spatial_epoch = 9999
autopilot_unfreeze_spatial_min_kge = 1.0
autopilot_unfreeze_spatial_lr_factor = 1.0

autopilot_nll = false
kendall_gal_auto = false

[loss]
# Box-Cox NLL en espace transformé (Bates & Campbell)
nll_distribution = "student-t"
nll_box_cox_lambda = 0.3

w_nll = 1.0                # driver (proper scoring)
w_nll_et = 0.0
w_nll_swe = 0.0
w_flatness = 0.0           # moniteur seul, pas pilote (gameable)
w_nse = 0.0
w_kge = 1.0                # monitoring
w_pbias = 0.0
w_mse = 0.0
w_log_nse = 0.0
w_log_mse = 0.0
w_nrmse = 0.0
w_physics = 0.0
w_residual = 0.0
w_et = 0.0
w_tws = 0.0
w_snow = 0.0
