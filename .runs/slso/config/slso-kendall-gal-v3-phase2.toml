# slso-kendall-gal-v3-phase2.toml
# Phase 2 probabiliste manuelle : warm-start depuis le best.pt du run v3
# (val_kge ≈ 0.91, atteint en cold-start sans intervention), backbone gelé,
# σ apprend la calibration via NLL gaussien hétéroscédastique.
#
# Démarche Nix-Weigend (séquentielle stricte) :
#   - μ figé au best de phase 1
#   - σ entraîné par NLL avec ConcreteDropout pour épistémique
#   - autopilot_nll ramp w_nll progressivement
#
# Le KGE ne peut pas changer (backbone gelé) — il sert de monitoring seul.
# La métrique trackée est nll.
#
# Pour lancer :
#   python .runs/slso/slso.py .runs/slso/config/slso-kendall-gal-v3-phase2.toml

[paths]
basin_db = "data/slso.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/io_2026-04/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing.nc"
checkpoint = "checkpoints/best-kendall-gal-v3-phase2.pt"
fields_nc = "results/fields-kendall-gal-v3-phase2.nc"
reach_parquet = "results/reach-kendall-gal-v3-phase2.parquet"
runs_db = "logs/runs-kendall-gal-v3-phase2.duckdb"

[basin]
prefix = "SLSO"

[temporal]
date_start = "2000-01-01"
spinup_end = "2000-12-31"
train_start = "2001-01-01"
train_end = "2018-12-31"
val_start = "2019-01-01"
val_end = "2021-12-31"
test_start = "2022-01-01"
test_end = "2024-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
concrete_dropout = true
concrete_init_p = 0.05
param_mode = "nerf"

[soil]
z1 = 0.30
z2_min = 0.30
z2_max = 1.50
z3_min = 0.50
z3_max = 4.00
rain_hours_min = 3.0
rain_hours_max = 24.0

[training]
# ── Warm-start depuis le best.pt du v3 phase 1 ───────────────────────────
warm_start = true
warm_start_from = "checkpoints/best-kendall-gal-v3.pt"

n_epochs = 50                       # phase 2 suffit en ~30 epochs typiquement
lr = 1e-4                           # LR plus bas pour ne pas perturber σ/μ
lr_finetune = 1e-4
warmup_epochs = 0                   # warm-start : pas de warmup
eta_min_factor = 1.0
weight_decay = 1e-4

# ── Backbone gelé, ConcreteDropout reste trainable ───────────────────────
freeze_spatial = true
freeze_temporal = true              # ConcreteDropout reste trainable
freeze_backbone = true

grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 180
val_every = 1
patience = 30
compile_modules = false

# ── Métrique trackée : NLL (lower is better) ─────────────────────────────
best_metric = "nll"
best_metric_tolerance = 0.005

station_weight_mode = "sqrt_area"   # cohérent avec phase 1 v3

# ── Régularisations σ ────────────────────────────────────────────────────
w_prior = 0.0                        # backbone gelé, pas de prior
w_boundary = 0.0
w_sigma_anchor = 1.0                 # ancrage σ modéré (validé diagnostic 2026-05-21)
sigma_anchor_target_a = -3.0
sigma_anchor_target_b = 1.0
w_concrete_kl = 0.01                 # régularisation épistémique

enable_temporal_epoch = 0
enable_residual_epoch = 9999
enable_travel_epoch = 9999
residual_warmup_epochs = 5
tta_warmup_epochs = 10

# ── Autopilot standard ───────────────────────────────────────────────────
autopilot = true
autopilot_grace_epochs = 3
autopilot_beta_threshold = 1.0      # désactivé (backbone gelé, β ne bouge pas)
autopilot_gamma_threshold = 1.0     # désactivé
autopilot_lr_patience = 10
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.05
autopilot_restart_max = 3
autopilot_restart_min_no_improve = 3

autopilot_unfreeze_spatial_epoch = 9999
autopilot_unfreeze_spatial_min_kge = 1.0
autopilot_unfreeze_spatial_lr_factor = 1.0

# ── NLL autopilot : ramp w_nll progressivement ──────────────────────────
autopilot_nll = true
autopilot_nll_initial_kge = 0.91    # baseline KGE du best v3
autopilot_nll_max_regression = 0.05 # tolère 5% drop si σ apprend (mais KGE gelé donc non-applicable)
autopilot_nll_ramp_rate = 1.5
autopilot_nll_max = 1.0
autopilot_nll_min = 0.01

# ── Kendall-Gal auto DÉSACTIVÉ (on est déjà en phase 2) ─────────────────
kendall_gal_auto = false

[loss]
# Phase 2 : NLL dominant, KGE en monitoring seul (backbone gelé)
w_nll = 0.1                         # autopilot rampera vers max=1.0
w_nll_et = 0.0                      # MODIS exploratoire, hors-paper
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 1.0                         # monitoring (gelé de toute façon)
w_pbias = 0.0
w_mse = 0.0
w_log_nse = 0.0
w_log_mse = 0.0
w_nrmse = 0.0
w_physics = 0.0
w_residual = 0.0
