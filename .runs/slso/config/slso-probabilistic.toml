# slso-probabilistic.toml
# Phase 2 probabiliste : backbone gelé, seul le noise_head + ConcreteDropout
# apprennent. KGE reste à 0.90 par construction, sigma apprend la calibration.
#
# Stratégie Kendall & Gal phase 2 :
#   - Phase 1 (déterministe) : KGE=0.90+ (best-fvert-warmstart.pt)
#   - Phase 2 (probabiliste) : freeze backbone, train NLL + ConcreteDropout
#   - Le spatial_encoder est gelé → les paramètres physiques ne bougent pas
#   - Le noise_head conditionne sur spatial_params → chaque bassin a son sigma
#   - ConcreteDropout (épistémique) reste trainable dans le temporal_encoder
#   - w_nll peut être agressif car KGE ne peut pas dégrader
#
# Pour lancer :
#   python .runs/slso/slso.py .runs/slso/config/slso-probabilistic.toml

[paths]
basin_db = "data/slso.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/io_2026-04/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing.nc"
checkpoint = "checkpoints/best-probabilistic.pt"
fields_nc = "results/fields-probabilistic.nc"
reach_parquet = "results/reach-probabilistic.parquet"
runs_db = "runs-probabilistic.duckdb"

[basin]
prefix = "SLSO"

[temporal]
date_start = "2000-01-01"
spinup_end = "2000-12-31"
train_start = "2001-01-01"
train_end = "2018-12-31"
val_start = "2019-01-01"
val_end = "2021-12-31"
test_start = "2022-01-01"
test_end = "2024-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
concrete_dropout = true
concrete_init_p = 0.05
param_mode = "nerf"

[soil]
z1 = 0.30
z2_min = 0.30
z2_max = 1.50
z3_min = 0.50
z3_max = 4.00
rain_hours_min = 3.0
rain_hours_max = 24.0

[training]
n_epochs = 15
lr = 1e-4                         # plus haut car seul noise_head apprend
lr_finetune = 1e-4
warmup_epochs = 0
eta_min_factor = 1.0
weight_decay = 1e-4
freeze_spatial = true             # backbone gelé
freeze_temporal = true            # temporal encoder gelé (sauf ConcreteDropout)
freeze_backbone = true            # vertical column + routing gelés
warm_start = true
warm_start_from = "checkpoints/best-probabilistic.pt"
grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 365
val_every = 1
patience = 30
compile_modules = false
best_metric = "nll"               # optimiser la calibration, pas le KGE (gelé)
best_metric_tolerance = 0.005

w_prior = 0.0                     # pas de régularisation spatiale (gelé)
w_boundary = 0.0                  # pas de boundary (gelé)
w_sigma_anchor = 1.0              # ancrage modéré — sigma reste raisonnable
sigma_anchor_target_a = -3.0      # ≈ 5% relative noise par défaut
sigma_anchor_target_b = 1.0       # proportional noise
w_concrete_kl = 0.01              # régularisation épistémique modérée

enable_temporal_epoch = 0
enable_residual_epoch = 9999
enable_travel_epoch = 9999
residual_warmup_epochs = 5
tta_warmup_epochs = 10

# ── Autopilot ─────────────────────────────────────────────────────
autopilot = true
autopilot_grace_epochs = 3
autopilot_beta_threshold = 0.15
autopilot_gamma_penalty = 0.003
autopilot_gamma_threshold = 0.20
autopilot_lr_patience = 10
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.05
autopilot_restart_max = 3

# Pas de dégel mid-run
autopilot_unfreeze_spatial_epoch = 9999
autopilot_unfreeze_spatial_min_kge = 1.0
autopilot_unfreeze_spatial_lr_factor = 1.0

# ── NLL autopilot ────────────────────────────────────────────────
# Avec le backbone gelé, le KGE ne peut pas bouger, donc l'autopilot
# NLL est moins critique. On le garde pour ajuster w_nll si sigma dérive.
autopilot_nll = true
autopilot_nll_initial_kge = 0.90
autopilot_nll_max_regression = 0.05
autopilot_nll_ramp_rate = 1.5
autopilot_nll_max = 1.0            # w_nll peut monter haut car KGE est gelé
autopilot_nll_min = 0.01

[loss]
w_nll = 0.1                       # NLL dominant — c'est le signal qu'on optimise
w_nll_et = 0.0
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 1.0                       # KGE comme monitoring (gelé de toute façon)
w_pbias = 0.0                      # pas besoin de pbias avec backbone gelé
w_mse = 0.0
w_log_nse = 0.0
w_log_mse = 0.0
w_nrmse = 0.0
w_physics = 0.0                    # pas de physics loss avec backbone gelé
w_residual = 0.0                   # pas de residual loss