# slso-mcd-quantile.toml — Étape 1 : MC Dropout sur NeRF spatial + tête quantile.
#
# Objectif : tester l'hypothèse « ce qui manque à la calibration probabiliste,
# c'est l'incertitude épistémique paramétrique ».
#
# Protocole :
#   1) Activer dropout=0.1 dans le NeRF spatial (`drop1`, `drop2`)
#   2) Réentraîner backbone+quantile head avec dropout actif (Gal-Ghahramani 2016)
#   3) À l'inférence : N=50 forwards avec dropout actif → CDF empirique sur 50×K quantiles
#   4) Mesurer PIT/cov sur cette CDF empirique
#
# Si δ² ≤ 0.05 et cov_50 ≈ 0.5 → épistémique était la pièce manquante.
# Si non → passer à Option 3 (Flow conditionnel) ou ensembles.
#
# Lancer :
#   uv run python .runs/slso/slso.py .runs/slso/config/slso-mcd-quantile.toml

[paths]
basin_db = "data/slso.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/io_2026-04/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing.nc"
checkpoint = "checkpoints/best-mcd-quantile.pt"
fields_nc = "results/fields-mcd-quantile.nc"
reach_parquet = "results/reach-mcd-quantile.parquet"
runs_db = "logs/runs-mcd-quantile.duckdb"

[basin]
prefix = "SLSO"

[forcing]
era5_vars = []

[temporal]
date_start = "2000-01-01"
spinup_end = "2000-12-31"
train_start = "2001-01-01"
train_end = "2018-12-31"
val_start = "2019-01-01"
val_end = "2021-12-31"
test_start = "2022-01-01"
test_end = "2024-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
# ── NOUVEAU : dropout actif sur NeRF spatial ───────────────────────────
# 10% sur fc1 et fc2 du NeRF. Pendant l'entraînement, le réseau apprend à
# compenser ce bruit. À l'inférence, MC sampling de N=50 forwards capture
# l'incertitude épistémique sur les paramètres physiques.
dropout = 0.1
concrete_dropout = true   # garde sur temporal_encoder (utile si on active le GRU plus tard)
concrete_init_p = 0.05
param_mode = "nerf"

[soil]
z1 = 0.30
z2_min = 0.30
z2_max = 1.50
z3_min = 0.50
z3_max = 4.00
rain_hours_min = 3.0
rain_hours_max = 24.0

[training]
warm_start = true
warm_start_from = "checkpoints/best-phase1-grace.pt"

n_epochs = 15            # le backbone doit s'adapter au dropout, prendre du temps
lr = 5e-5                # ½ du baseline 1e-4 : warm-start avec dropout, conservateur
lr_finetune = 5e-5
warmup_epochs = 0
eta_min_factor = 1.0
weight_decay = 1e-4

# Backbone dégelé : doit ré-apprendre avec dropout actif (sinon dropout = bruit pur)
freeze_spatial = false
freeze_temporal = false
freeze_backbone = false

grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 180
val_every = 1
patience = 8
compile_modules = false
best_metric = "kge"         # monitoring déterministe (sur médiane = μ pour quantile)
best_metric_tolerance = 0.0
station_weight_mode = "sqrt_area"

w_prior = 0.005
w_boundary = 0.0
w_sigma_anchor = 0.0
w_concrete_kl = 1e-5        # léger : KL ConcreteDropout (Gal-Ghahramani bayésien)

enable_temporal_epoch = 0
enable_residual_epoch = 9999
enable_travel_epoch = 9999
residual_warmup_epochs = 5
tta_warmup_epochs = 10

autopilot = true
autopilot_grace_epochs = 5
autopilot_beta_threshold = 1.00
autopilot_beta_penalty = 0.005
autopilot_gamma_threshold = 0.20
autopilot_gamma_penalty = 0.003
autopilot_lr_patience = 6
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.20
autopilot_restart_max = 2
autopilot_restart_min_no_improve = 3

autopilot_unfreeze_spatial_epoch = 9999
autopilot_unfreeze_spatial_min_kge = 1.0
autopilot_unfreeze_spatial_lr_factor = 1.0

autopilot_nll = false
kendall_gal_auto = false

[loss]
# Régression quantile, médiane ancrée à Q_sim (comme Phase 2 v2)
# K = 6 quantiles. L'épistémique vient du dropout, pas de la richesse de la tête.
nll_distribution = "quantile"
quantile_taus = [0.05, 0.10, 0.25, 0.75, 0.90, 0.95]

w_nll = 0.0
w_nll_et = 0.0
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 1.0                 # monitoring déterministe
w_pbias = 0.1
w_mse = 0.1
w_log_nse = 0.0
w_log_mse = 0.3
w_nrmse = 0.0
w_quantile = 1.0            # pilote la calibration des quantiles
w_peak = 0.0
w_physics = 0.01
w_residual = 0.01
w_flatness = 0.0

# Multi-obj conservés (acquis phase1-grace)
w_et = 0.1
w_tws = 0.3
w_snow = 0.0
