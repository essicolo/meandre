# slso-kendall-gal-v3-phase2-boxcox-cal.toml
# Reprise warm-start du run boxcox crashé (epoch 11) avec trajectoire σ corrigée.
#
# Diagnostic du crash (2026-05-25) :
#   - val_cov_90 a dérivé 0.925 → 0.836 (sous-couverture, σ trop serré),
#     pendant que val_cov_50 tombait pile sur 0.50 — donc problème de FORME
#     des queues, pas d'échelle globale.
#   - Cause : w_sigma_anchor=10 dominait w_flatness=0.5 (20:1). La trajectoire
#     a convergé vers la géométrie devinée de l'anchor (a=-3, b=1) au lieu de
#     la calibration. Or l'anchor est anti-dégénérescence (σ gonflé pour
#     masquer un mauvais μ) — rôle CADUC ici puisque μ (backbone) est gelé.
#
# Correction (« laisser la calibration piloter ») :
#   - w_sigma_anchor 10 → 1.0 (simple garde-fou, plus le pilote)
#   - w_flatness     0.5 → 2.0 (la calibration PIT mène)
#   - w_nll          0.1 → 0.3
#   - var_weight conservé (0.5) pour empêcher l'explosion σ inter-nœuds
#   - best_metric "nll" → "val_flatness" : le checkpoint sauvé est désormais
#     le MIEUX CALIBRÉ, pas le plus bas NLL (qui tolérait le sur-resserrement).
#     (val_flatness ajouté à la liste lower-is-better du trainer.)
#
# Pour lancer :
#   python .runs/slso/slso.py .runs/slso/config/slso-kendall-gal-v3-phase2-boxcox-cal.toml

[paths]
basin_db = "data/slso.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/io_2026-04/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing.nc"
checkpoint = "checkpoints/best-kendall-gal-v3-phase2-boxcox-cal.pt"
fields_nc = "results/fields-kendall-gal-v3-phase2-boxcox-cal.nc"
reach_parquet = "results/reach-kendall-gal-v3-phase2-boxcox-cal.parquet"
runs_db = "logs/runs-kendall-gal-v3-phase2-boxcox-cal.duckdb"

[basin]
prefix = "SLSO"

[temporal]
date_start = "2000-01-01"
spinup_end = "2000-12-31"
train_start = "2001-01-01"
train_end = "2018-12-31"
val_start = "2019-01-01"
val_end = "2021-12-31"
test_start = "2022-01-01"
test_end = "2024-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
concrete_dropout = true
concrete_init_p = 0.05
param_mode = "nerf"

[soil]
z1 = 0.30
z2_min = 0.30
z2_max = 1.50
z3_min = 0.50
z3_max = 4.00
rain_hours_min = 3.0
rain_hours_max = 24.0

[training]
# ── Reprise warm-start depuis le best.pt du run boxcox crashé (epoch 11) ──
warm_start = true
warm_start_from = "checkpoints/best-kendall-gal-v3-phase2-boxcox.pt"

n_epochs = 20
lr = 5e-5
lr_finetune = 5e-5
warmup_epochs = 0
eta_min_factor = 1.0
weight_decay = 1e-4

# ── Backbone gelé (idem phase 2) ─────────────────────────────────────────
freeze_spatial = true
freeze_temporal = true
freeze_backbone = true

grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 180
val_every = 1
# best_metric non-monotone (calibration) → patience utile pour early-stop
patience = 8
compile_modules = false

# ── Métrique trackée : flatness PIT (lower is better) ───────────────────
best_metric = "val_flatness"
best_metric_tolerance = 0.005

station_weight_mode = "sqrt_area"

# ── Régularisations σ : anchor démoté en simple garde-fou ────────────────
w_prior = 0.0
w_boundary = 0.0
# μ gelé → l'anchor anti-dégénérescence n'est plus nécessaire comme pilote.
# On garde un w faible + var_weight pour empêcher l'explosion σ inter-nœuds.
w_sigma_anchor = 1.0
sigma_anchor_target_a = -3.0
sigma_anchor_target_b = 1.0
sigma_anchor_var_weight = 0.5
w_concrete_kl = 0.01

enable_temporal_epoch = 0
enable_residual_epoch = 9999
enable_travel_epoch = 9999
residual_warmup_epochs = 5
tta_warmup_epochs = 10

# ── Autopilot ────────────────────────────────────────────────────────────
autopilot = true
autopilot_grace_epochs = 5           # marge : les poids de loss changent vs run crashé
autopilot_beta_threshold = 1.0
autopilot_gamma_threshold = 1.0
autopilot_lr_patience = 10
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.10
autopilot_restart_max = 3
autopilot_restart_min_no_improve = 3

autopilot_unfreeze_spatial_epoch = 9999
autopilot_unfreeze_spatial_min_kge = 1.0
autopilot_unfreeze_spatial_lr_factor = 1.0

autopilot_nll = false
kendall_gal_auto = false

[loss]
# ── Distribution probabiliste : Box-Cox(0.3) — standard hydro ───────────
nll_distribution = "box-cox"
nll_box_cox_lambda = 0.3

# NLL Gaussienne dans l'espace transformé — montée pour seconder la flatness
w_nll = 0.3

# ── Flatness loss directe sur PIT histogram : pilote principal ──────────
w_flatness = 2.0
flatness_n_bins = 21
flatness_bandwidth = 0.02

# Reste : monitoring seul (backbone gelé)
w_nll_et = 0.0
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 1.0                          # monitoring (KGE doit rester ~0.91)
w_pbias = 0.0
w_mse = 0.0
w_log_nse = 0.0
w_log_mse = 0.0
w_nrmse = 0.0
w_physics = 0.0
w_residual = 0.0
