# slso-phase2-grace-quantile.toml — Phase 2 v2 : régression quantile.
#
# Backbone GELÉ (best-phase1-grace.pt, multi-obj, KGE 0.921). On entraîne UNIQUEMENT
# la tête quantile (offsets δ_τ depuis μ, médiane = μ par construction). Pinball
# loss sur K=6 quantiles τ ∈ {0.05, 0.10, 0.25, 0.75, 0.90, 0.95}, en m³/s.
#
# Cohérent avec Klotz et al. 2022 (LSTM-QR hydrologie DL) et le diagnostic
# Talagrand non-paramétrique du 29 mai (modèle BC sous-dispersé asymétrique).
#
# Lancer (WSL) :
#   wsl ... ./.venv-wsl/bin/python .runs/slso/slso.py \
#           .runs/slso/config/slso-phase2-grace-quantile.toml

[paths]
basin_db = "data/slso.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/io_2026-04/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing.nc"
checkpoint = "checkpoints/best-phase2-grace-quantile.pt"
fields_nc = "results/fields-phase2-grace-quantile.nc"
reach_parquet = "results/reach-phase2-grace-quantile.parquet"
runs_db = "logs/runs-phase2-grace-quantile.duckdb"

[basin]
prefix = "SLSO"

[forcing]
era5_vars = []

[temporal]
date_start = "2000-01-01"
spinup_end = "2000-12-31"
train_start = "2001-01-01"
train_end = "2018-12-31"
val_start = "2019-01-01"
val_end = "2021-12-31"
test_start = "2022-01-01"
test_end = "2024-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
concrete_dropout = true
concrete_init_p = 0.05
param_mode = "nerf"

[soil]
z1 = 0.30
z2_min = 0.30
z2_max = 1.50
z3_min = 0.50
z3_max = 4.00
rain_hours_min = 3.0
rain_hours_max = 24.0

[training]
warm_start = true
warm_start_from = "checkpoints/best-phase1-grace.pt"

n_epochs = 20
lr = 1e-3              # ×10 vs Box-Cox σ : tête quantile fresh-init, pas warm-startée
lr_finetune = 1e-3
warmup_epochs = 0
eta_min_factor = 1.0
weight_decay = 1e-4

# Backbone GELÉ — médiane = μ figée à KGE 0.921
freeze_spatial = true
freeze_temporal = true
freeze_backbone = true

grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 180
val_every = 1
patience = 8
compile_modules = false

best_metric = "nll"          # = pinball moyen en mode quantile (mappé)
best_metric_tolerance = 0.005
station_weight_mode = "sqrt_area"

w_prior = 0.0
w_boundary = 0.0
w_sigma_anchor = 0.0
w_concrete_kl = 0.0

enable_temporal_epoch = 0
enable_residual_epoch = 9999
enable_travel_epoch = 9999
residual_warmup_epochs = 5
tta_warmup_epochs = 10

autopilot = true
autopilot_grace_epochs = 3
autopilot_beta_threshold = 1.0
autopilot_gamma_threshold = 1.0
autopilot_lr_patience = 10
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.10
autopilot_restart_max = 3
autopilot_restart_min_no_improve = 3

autopilot_unfreeze_spatial_epoch = 9999
autopilot_unfreeze_spatial_min_kge = 1.0
autopilot_unfreeze_spatial_lr_factor = 1.0

autopilot_nll = false
kendall_gal_auto = false

[loss]
# Régression quantile en m³/s — pas de NLL, pas de Box-Cox.
nll_distribution = "quantile"
quantile_taus = [0.05, 0.10, 0.25, 0.75, 0.90, 0.95]

w_nll = 0.0
w_nll_et = 0.0
w_nll_swe = 0.0
w_flatness = 0.0
w_nse = 0.0
w_kge = 1.0                  # monitoring déterministe (figé)
w_pbias = 0.0
w_mse = 0.0
w_log_nse = 0.0
w_log_mse = 0.0
w_nrmse = 0.0
w_physics = 0.0
w_residual = 0.0
w_et = 0.0
w_tws = 0.0
w_snow = 0.0

# Pilote unique en Phase 2 v2 : pinball multi-quantile
w_quantile = 1.0
