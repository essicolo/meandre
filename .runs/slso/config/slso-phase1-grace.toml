# slso-phase1-grace.toml — Phase 1 multi-contraintes, TEST RAPIDE 3 ans.
#
# Leçon de l'epoch-0 ET-seule : l'ET compense le faible baseflow (vole à Q,
# f_vert ne décolle pas, KGE 0.904→0.849). Il faut FERMER LE BILAN : contraindre
# le stockage total (GRACE TWS) conjointement, pour que monter l'ET force la
# percolation (f_vert↑) plutôt que voler à Q.
#
# Test rapide : train 3 ans (2015-2017) + spinup 1 an → ~6× plus rapide que 18 ans.
# ERA5 OFF (proxies) pour isoler l'effet GRACE+ET. Backbone dégelé.
#
# REQUIERT le câblage GRACE (w_tws) dans loss.py + trainer + slso.py (en cours).
#
# Lancer (WSL) :
#   wsl ... ./.venv-wsl/bin/python .runs/slso/slso.py \
#           .runs/slso/config/slso-phase1-grace.toml

[paths]
basin_db = "data/slso.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/io_2026-04/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing.nc"
checkpoint = "checkpoints/best-phase1-grace.pt"
fields_nc = "results/fields-phase1-grace.nc"
reach_parquet = "results/reach-phase1-grace.parquet"
runs_db = "logs/runs-phase1-grace.duckdb"

[basin]
prefix = "SLSO"

[forcing]
era5_vars = []   # proxies (ERA5 off pour ce test)

[temporal]
# date_start/end = 2000/2024 pour RÉUTILISER le cache forcing.nc (sinon
# re-extraction zarr, chemin C:/ inaccessible en WSL). Le TRAIN court (3 ans)
# vient de train_start/end ; spinup 2014 (epoch 0 ~16min no_grad, époques 1+
# rapides via warm-spinup 90j).
date_start = "2000-01-01"
spinup_end = "2014-12-31"
train_start = "2015-01-01"
train_end = "2017-12-31"
val_start = "2018-01-01"
val_end = "2019-12-31"
test_start = "2020-01-01"
test_end = "2021-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
concrete_dropout = true
concrete_init_p = 0.05
param_mode = "nerf"

[soil]
z1 = 0.30
z2_min = 0.30
z2_max = 1.50
z3_min = 0.50
z3_max = 4.00
rain_hours_min = 3.0
rain_hours_max = 24.0

[training]
warm_start = true
warm_start_from = "checkpoints/best-kendall-gal-v3.pt"
n_epochs = 15
lr = 1e-4
lr_finetune = 1e-4
warmup_epochs = 0
eta_min_factor = 1.0
weight_decay = 2e-4

freeze_spatial = false
freeze_temporal = false
freeze_backbone = false

grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 180          # >0 : ET + GRACE câblés dans le chemin chunké
val_every = 1
patience = 15
compile_modules = false
best_metric = "kge"
best_metric_tolerance = 0.0
station_weight_mode = "sqrt_area"

w_prior = 0.005
w_boundary = 0.0
w_sigma_anchor = 0.0
w_concrete_kl = 0.0

enable_temporal_epoch = 0
enable_residual_epoch = 9999
enable_travel_epoch = 9999
residual_warmup_epochs = 5
tta_warmup_epochs = 10

autopilot = true
autopilot_grace_epochs = 5
autopilot_beta_threshold = 1.00
autopilot_beta_penalty = 0.005
autopilot_gamma_threshold = 0.20
autopilot_gamma_penalty = 0.003
autopilot_lr_patience = 6
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.20   # tolérant : ET+GRACE déplacent le KGE
autopilot_restart_max = 2
autopilot_restart_min_no_improve = 3

autopilot_unfreeze_spatial_epoch = 9999
autopilot_unfreeze_spatial_min_kge = 1.0
autopilot_unfreeze_spatial_lr_factor = 1.0

autopilot_nll = false
kendall_gal_auto = false

[loss]
w_nll = 0.0
w_nll_et = 0.0
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 1.0
w_pbias = 0.1
w_mse = 0.1
w_log_nse = 0.0
w_log_mse = 0.3
w_nrmse = 0.0
w_physics = 0.01
w_residual = 0.01

# ── Contraintes multi-objectifs ──────────────────────────────────────────
w_et = 0.1     # ET MODIS (match) — modéré
w_tws = 0.3    # GRACE TWS (normalisé z-score σ=25mm) — influence réelle sur f_vert
w_snow = 0.0
