# slso-phase1-et.toml — Phase 1 du plan multi-objectifs.
# Objectif : casser le collapse f_vert (sol profond inerte, ETR -26% vs MODIS,
# params spatialement uniformes) en ajoutant une contrainte ETR MODIS sur le
# backbone DÉGELÉ, forçage ERA5-Land activé.
#
# Design (cf project_meandre_multiobj_plan) :
#   - warm-start depuis le 0.904 (best-kendall-gal-v3.pt), fine-tune lr=1e-4.
#   - w_et = MSE sur l'ETR (contraint μ→backbone direct ; l'incertitude/Student-t
#     = Phase 4). Le terme ET est câblé dans le chemin chunké (chunk_steps>0) et
#     entraîne bien le backbone (vérifié : grad spatial_encoder non nul).
#   - kendall_gal_auto = false : on RESTE en phase 1 (backbone entraîné), pas de
#     re-gel auto en phase 2.
#   - autopilot rollback assoupli : l'ET déplace légitimement le KGE.
#
# PRÉREQUIS avant de lancer (en WSL) :
#   1. Ingestion MOD16A2GF 8-jours terminée (ingest_modis_et8.py).
#   2. ERA5-Land sera fetché au 1er run (extract_forcing, ~heures, cache D:).
#      → ~/.cdsapirc doit être dans le home WSL (/home/essi).
#   3. Lancer : wsl ... ./.venv-wsl/bin/python .runs/slso/slso.py \
#                       .runs/slso/config/slso-phase1-et.toml
#
# Critères de succès : r spatial ET sim-vs-MODIS remonte de ~0 ; ETR vers MODIS ;
# f_vert s'éloigne de 0 (sol profond revit) ; KGE Q tient (~0.88+).

[paths]
basin_db = "data/slso.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/io_2026-04/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing.nc"
checkpoint = "checkpoints/best-phase1-et.pt"
fields_nc = "results/fields-phase1-et.nc"
reach_parquet = "results/reach-phase1-et.parquet"
runs_db = "logs/runs-phase1-et.duckdb"

[basin]
prefix = "SLSO"

[forcing]
# Phase 1a : SANS ERA5 (proxies dérivés de T) pour tester si l'ET seule
# décollapse f_vert, sans dépendre du download ERA5. Pour activer ERA5
# (Phase 1b) : era5_vars = ["R_n", "e_a", "u2"].
era5_vars = []
era5_cache = "/mnt/d/meandre-data/era5"

[temporal]
date_start = "2000-01-01"
spinup_end = "2000-12-31"
train_start = "2001-01-01"
train_end = "2018-12-31"
val_start = "2019-01-01"
val_end = "2021-12-31"
test_start = "2022-01-01"
test_end = "2024-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
concrete_dropout = true
concrete_init_p = 0.05
param_mode = "nerf"

[soil]
z1 = 0.30
z2_min = 0.30
z2_max = 1.50
z3_min = 0.50
z3_max = 4.00
rain_hours_min = 3.0
rain_hours_max = 24.0

[training]
# ── Warm-start depuis le backbone 0.904 ──────────────────────────────────
warm_start = true
warm_start_from = "checkpoints/best-kendall-gal-v3.pt"
n_epochs = 40
lr = 1e-4
lr_finetune = 1e-4
warmup_epochs = 0
eta_min_factor = 1.0
weight_decay = 2e-4

# ── Backbone DÉGELÉ (on entraîne la physique) ────────────────────────────
freeze_spatial = false
freeze_temporal = false
freeze_backbone = false

grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 180          # >0 REQUIS : le terme ET est câblé dans le chemin chunké
val_every = 1
patience = 40
compile_modules = false
best_metric = "kge"
best_metric_tolerance = 0.0
station_weight_mode = "sqrt_area"

# ── Régularisations ──────────────────────────────────────────────────────
w_prior = 0.005            # prior littérature léger (inclut f_vert 0.5/0.6/0.7) ;
                           # renforcer en Phase 3 si ET ne décollapse pas assez
w_boundary = 0.0
w_sigma_anchor = 0.0       # pas de NLL en Phase 1 (w_nll=0) → anchor inactif
w_concrete_kl = 0.0

enable_temporal_epoch = 0
enable_residual_epoch = 9999
enable_travel_epoch = 9999
residual_warmup_epochs = 5
tta_warmup_epochs = 10

# ── Autopilot : rollback assoupli (l'ET déplace le KGE légitimement) ──────
autopilot = true
autopilot_grace_epochs = 10
autopilot_beta_threshold = 1.00
autopilot_beta_penalty = 0.005
autopilot_gamma_threshold = 0.20
autopilot_gamma_penalty = 0.003
autopilot_lr_patience = 8
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.15   # plus tolérant qu'en v3 (0.05) : ET bouge le KGE
autopilot_restart_max = 2
autopilot_restart_min_no_improve = 3

autopilot_unfreeze_spatial_epoch = 9999
autopilot_unfreeze_spatial_min_kge = 1.0
autopilot_unfreeze_spatial_lr_factor = 1.0

# Pas de ramp NLL ni d'orchestration phase1→2 : on reste en phase 1 backbone.
autopilot_nll = false
kendall_gal_auto = false

[loss]
# Q : config 0.904 (KGE + pbias + mse + log_mse + physique)
w_nll = 0.0
w_nll_et = 0.0             # MSE (w_et), pas NLL, en Phase 1
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 1.0
w_pbias = 0.1
w_mse = 0.1
w_log_nse = 0.0
w_log_mse = 0.3
w_nrmse = 0.0
w_physics = 0.01
w_residual = 0.01

# ── NOUVEAU : contrainte ETR MODIS (MSE) — casse l'équifinalité ──────────
# Démarrage doux pour ne pas choquer le backbone 0.904 ; tunable (0.05-0.3).
w_et = 0.1
w_snow = 0.0
