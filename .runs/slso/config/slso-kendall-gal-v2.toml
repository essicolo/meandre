# slso-kendall-gal-v2.toml
# Run safe avec les corrections issues du diagnostic 2026-05-21 :
#   - log_nse remplace log_mse (anti peak-shaving, voir
#     project_meandre_peak_shaving_loss_balance)
#   - w_mse abaissé de 0.5 à 0.2 (moins de pression sur la moyenne brute)
#   - station_weight_mode = "uniform" (anti petits-bassins-poubelle, voir
#     project_meandre_probabilistic_results_2026-05-20)
#   - w_sigma_anchor = 1.0 (anti plateau cov90 confirmé par diagnostic)
#   - NE PAS activer w_nll_et (MODIS pas branché dans la pipeline)
#   - NE PAS activer residual corrector (besoin de redesign, voir
#     project_meandre_corrector_redesign_todo)
#
# Pour lancer :
#   python .runs/slso/slso.py .runs/slso/config/slso-kendall-gal-v2.toml

[paths]
basin_db = "data/slso.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/io_2026-04/data/03_imputation/quebec.zarr"
forcing_cache = "data/forcing.nc"
checkpoint = "checkpoints/best-kendall-gal-v2.pt"
fields_nc = "results/fields-kendall-gal-v2.nc"
reach_parquet = "results/reach-kendall-gal-v2.parquet"
runs_db = "logs/runs-kendall-gal-v2.duckdb"

[basin]
prefix = "SLSO"

[temporal]
date_start = "2000-01-01"
spinup_end = "2000-12-31"
train_start = "2001-01-01"
train_end = "2018-12-31"
val_start = "2019-01-01"
val_end = "2021-12-31"
test_start = "2022-01-01"
test_end = "2024-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
concrete_dropout = true
concrete_init_p = 0.05
param_mode = "nerf"

[soil]
z1 = 0.30
z2_min = 0.30
z2_max = 1.50
z3_min = 0.50
z3_max = 4.00
rain_hours_min = 3.0
rain_hours_max = 24.0

[training]
n_epochs = 60
lr = 1e-3
lr_finetune = 1e-4
warmup_epochs = 5
eta_min_factor = 1.0
weight_decay = 1e-4
freeze_spatial = false
freeze_temporal = false
freeze_backbone = false
warm_start = false
grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 365
val_every = 1
patience = 50
compile_modules = false
best_metric = "kge_station"
best_metric_tolerance = 0.0

# Poids des stations : uniforme par défaut (anti petits-bassins-poubelle)
station_weight_mode = "uniform"

w_prior = 0.01
w_boundary = 0.005
w_sigma_anchor = 1.0               # ← validé par diagnostic 2026-05-21 (était 10.0)
sigma_anchor_target_a = -3.0
sigma_anchor_target_b = 1.0
w_concrete_kl = 0.01

enable_temporal_epoch = 0
enable_residual_epoch = 9999       # ← désactivé volontairement (redesign TODO)
enable_travel_epoch = 9999
residual_warmup_epochs = 5
tta_warmup_epochs = 10

# ── Autopilot standard ──────────────────────────────────────────
autopilot = true
autopilot_grace_epochs = 3
autopilot_beta_threshold = 0.15
autopilot_gamma_threshold = 0.20
autopilot_lr_patience = 10
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.05
autopilot_restart_max = 3

autopilot_unfreeze_spatial_epoch = 9999
autopilot_unfreeze_spatial_min_kge = 1.0
autopilot_unfreeze_spatial_lr_factor = 1.0

# ── NLL autopilot : actif en phase 2 ────────────────────────────
autopilot_nll = true
autopilot_nll_initial_kge = 0.85
autopilot_nll_max_regression = 0.05
autopilot_nll_ramp_rate = 1.5
autopilot_nll_max = 1.0
autopilot_nll_min = 0.01

# ── Kendall-Gal phase 1→2 ───────────────────────────────────────
kendall_gal_auto = true
kga_phase1_kge_threshold = 0.85
kga_phase1_plateau_patience = 20
kga_phase1_min_epochs = 10
kga_phase2_reset_no_improve = true

[loss]
# Phase 1 : déterministe — KGE + MSE + log_NSE + PBIAS
# log_NSE normalisé par var(log Q_obs) → moins agressif sur étiages que log_MSE
# tout en maintenant une bonne représentation des récessions estivales.
w_nll = 0.0
w_nll_et = 0.0                     # ← MODIS non branché dans pipeline
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 1.0
w_pbias = 0.1
w_mse = 0.2                        # ← baissé de 0.5 (moins de pression moyenne brute)
w_log_nse = 0.3                    # ← REMPLACE w_log_mse=0.3 (anti peak-shaving)
w_log_mse = 0.0
w_nrmse = 0.0
w_physics = 0.0
w_residual = 0.0

[phase2]
freeze_spatial = true
freeze_temporal = true
freeze_backbone = true
best_metric = "nll"
lr = 1e-4

[phase2.loss]
w_nll = 0.1
w_kge = 1.0
w_pbias = 0.0
w_mse = 0.0
w_log_nse = 0.0
w_log_mse = 0.0
w_physics = 0.0
w_residual = 0.0
