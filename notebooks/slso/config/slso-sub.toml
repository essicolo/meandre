# ─── SLSO Sub-basin (station 023448, ~204 nodes) ─────────────────────────
# Petit sous-bassin pour itération rapide. Généré par extract_subbasin.py.

[paths]
basin_db = "notebooks/slso/data/slso-sub.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/rqh_2026-03/data/03_imputation/quebec.zarr"
#weather_grid   = "/mnt/c/Users/parse01/documents-locaux/rqh-local/rqh_2026-03/data/03_imputation/quebec.zarr"
forcing_cache = "notebooks/slso/data/forcing-sub.nc"
checkpoint = "notebooks/slso/checkpoints/best-sub.pt"
fields_nc = "notebooks/slso/results/fields-sub.nc"
reach_parquet = "notebooks/slso/results/reach-sub.parquet"
runs_db = "notebooks/slso/runs-sub.duckdb"

[basin]
prefix = "SLSO"

[temporal]
date_start = "2016-01-01"
spinup_end = "2016-12-31"
train_start = "2022-01-01"
train_end = "2022-12-31"
val_start = "2023-01-01"
val_end = "2023-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
param_mode = "nerf"

[training]
n_epochs = 30            # tuning v4 : run plus long pour vraie convergence
# v1 : lr=5e-4 + warmup → diverge (β=2.33)
# v2 : lr=1e-4 constant → stable mais β=1.3 (σ encore gonflée)
# v3 : v2 + w_sigma_anchor=0.5 → identique v2 (anchor 1000× trop faible)
# v4 : w_sigma_anchor=200 (math-justified) + 30 epochs pour vraie convergence
lr = 1e-4
lr_finetune = 1e-4
warmup_epochs = 0
weight_decay = 2e-4
# Régularisation σ : poids math-justifié pour compétitionner le gradient NLL.
# Gradient NLL sur log_sigma_a ≈ N_obs (365 ici). Gradient anchor = 2(δ)*w.
# Pour qu'anchor batte NLL : w ≈ N_obs / (2δ) ≈ 200 pour δ ≈ 1.
w_sigma_anchor = 200.0
sigma_anchor_target_a = -3.0
grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 365            # 1 an = 1 chunk, NSE/KGE utilisable
val_every = 1
patience = 20
warm_start = false  # cold start: bornes K_musk élargies → ancien checkpoint plus valide
compile_modules = false
best_metric = "kge_station"

enable_temporal_epoch = 0
enable_residual_epoch = 9999   # désactivé — design actuel doomed, cf. project memory
enable_travel_epoch = 9999
residual_warmup_epochs = 5

# Autopilot (même config que slso.toml, avec grace)
autopilot = false
autopilot_grace_epochs = 10
autopilot_beta_threshold = 0.15
autopilot_beta_penalty = 0.005
autopilot_gamma_threshold = 0.20
autopilot_gamma_penalty = 0.003
autopilot_lr_patience = 8
autopilot_lr_factor = 0.5
autopilot_lr_min = 1e-6
autopilot_restart_regression = 0.05
autopilot_restart_max = 3
autopilot_activate_residual_at_kge = 0.55

[loss]
# Tuning v2 du pivot probabiliste.
# Problème v1 : NLL non-régularisée → degeneracy σ→large, β explose.
# Fix : w_kge fortement augmenté pour ancrer μ_Q contre la dérive,
# w_log_mse activé pour préserver l'amplitude (anti-aplatissement).
w_nll = 0.5
w_nll_et = 0.0   # multi-obj bloqué sur data layer MODIS (cf. pivot étape 4)
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 2.0       # ancre forte sur la qualité du fit moyen
w_pbias = 0.0
w_mse = 0.0
w_log_nse = 0.0
w_log_mse = 0.5   # garde la peakiness, contre-balance le tirage NLL pro-platitude
w_nrmse = 0.0
w_physics = 0.01
w_residual = 0.01
