# ─── A/B test w_boundary : run AVEC boundary_regularization ────────
# Twin de slso-sub-noboundary.toml — seule différence : w_boundary=0.005
# Cold-start unfrozen NeRF pour donner au boundary regularizer
# l'opportunité d'agir pendant l'apprentissage.

[paths]
basin_db = "notebooks/slso/data/slso-sub.duckdb"
weather_grid = "C:/Users/parse01/documents-locaux/rqh-local/rqh_2026-03/data/03_imputation/quebec.zarr"
forcing_cache = "notebooks/slso/data/forcing-sub.nc"
checkpoint = "notebooks/slso/checkpoints/best-sub-boundary.pt"
fields_nc = "notebooks/slso/results/fields-sub-boundary.nc"
reach_parquet = "notebooks/slso/results/reach-sub-boundary.parquet"
runs_db = "notebooks/slso/runs-sub-boundary.duckdb"

[basin]
prefix = "SLSO"

[temporal]
date_start = "2016-01-01"
spinup_end = "2016-12-31"
train_start = "2022-01-01"
train_end = "2022-12-31"
val_start = "2023-01-01"
val_end = "2023-12-31"
date_end = "2024-12-31"

[model]
n_forcing = 6
context_window = 30
residual_history = 14
max_travel_days = 20
dropout = 0.0
param_mode = "nerf"

[training]
n_epochs = 8
lr = 2e-5
lr_finetune = 2e-5
warmup_epochs = 0
eta_min_factor = 1.0
weight_decay = 2e-4
freeze_spatial = false
warm_start = false
w_prior = 0.005
w_boundary = 0.005   # ← test treatment
w_sigma_anchor = 4000.0
sigma_anchor_target_a = -3.0
sigma_anchor_target_b = 1.0
grad_clip = 1.0
tbptt_steps = 365
chunk_steps = 365
val_every = 1
patience = 20
compile_modules = false
best_metric = "kge_station"

enable_temporal_epoch = 0
enable_residual_epoch = 9999
enable_travel_epoch = 9999
residual_warmup_epochs = 5
autopilot = false

[loss]
w_nll = 1.0
w_nll_et = 0.0
w_nll_swe = 0.0
w_nse = 0.0
w_kge = 0.5
w_pbias = 500.0
w_mse = 0.0
w_log_nse = 0.0
w_log_mse = 0.5
w_nrmse = 0.0
w_physics = 0.01
w_residual = 0.01
